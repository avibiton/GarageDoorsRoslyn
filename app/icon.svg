<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Garage door frame -->
  <rect x="5" y="8" width="22" height="18" rx="1" fill="none" stroke="#facc15" stroke-width="1.5"/>
  <!-- Panel lines (horizontal) -->
  <line x1="5" y1="13" x2="27" y2="13" stroke="#facc15" stroke-width="1"/>
  <line x1="5" y1="18" x2="27" y2="18" stroke="#facc15" stroke-width="1"/>
  <line x1="5" y1="23" x2="27" y2="23" stroke="#facc15" stroke-width="1"/>
  <!-- Door handle -->
  <circle cx="16" cy="25" r="1.2" fill="#facc15"/>
  <!-- Ground line -->
  <line x1="3" y1="27" x2="29" y2="27" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
</svg>
